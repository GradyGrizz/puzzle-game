<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stack Tower</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; display: flex; justify-content: center; align-items: center; height: 100dvh; overflow: hidden; touch-action: none; }
canvas { display: block; max-width: 100vw; max-height: 100dvh; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = Math.min(window.innerWidth, 420);
  H = canvas.height = Math.min(window.innerHeight, 750);
}
resize();
window.addEventListener('resize', resize);

const BLOCK_H = 28;
const PERFECT_TOLERANCE = 3;
const CORNER_R = 4;

const neonHues = [320, 180, 260, 140, 30, 200, 340, 50, 280, 160];
function neonColor(i) { return neonHues[i % neonHues.length]; }

const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playNoise(duration) {
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  return { src, gain, filter, start(t) { src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); src.start(t); src.stop(t + duration); } };
}

function playLand() {
  const now = audioCtx.currentTime;
  const n = playNoise(0.08);
  n.filter.frequency.setValueAtTime(300, now);
  n.filter.frequency.exponentialRampToValueAtTime(80, now + 0.08);
  n.gain.gain.setValueAtTime(0.3, now);
  n.gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  n.start(now);
}

function playPerfect(streak) {
  const now = audioCtx.currentTime;
  const n = playNoise(0.05);
  n.filter.frequency.setValueAtTime(400, now);
  n.filter.frequency.exponentialRampToValueAtTime(100, now + 0.05);
  n.gain.gain.setValueAtTime(0.15, now);
  n.gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
  n.start(now);
  const freq = 260 + Math.min(streak, 10) * 25;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, now + 0.02);
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.12, now + 0.03);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(now + 0.02); osc.stop(now + 0.22);
}

function playFail() {
  const now = audioCtx.currentTime;
  const n = playNoise(0.3);
  n.filter.frequency.setValueAtTime(200, now);
  n.filter.frequency.exponentialRampToValueAtTime(40, now + 0.3);
  n.gain.gain.setValueAtTime(0.2, now);
  n.gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  n.start(now);
}

let fallingPieces = [];
let stack, moving, dir, speed, gameOver, score, streak, cameraY, perfectFlash;

function init() {
  stack = [{ x: W / 2 - 60, w: 120, y: H - BLOCK_H, ci: 0 }];
  moving = { x: 0, w: 120, y: H - BLOCK_H * 2, ci: 1 };
  dir = 1; speed = 2.5; gameOver = false;
  score = 0; streak = 0; cameraY = 0; perfectFlash = 0;
  fallingPieces = [];
}

function place() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const top = stack[stack.length - 1];
  const m = moving;
  const overlapL = Math.max(top.x, m.x);
  const overlapR = Math.min(top.x + top.w, m.x + m.w);
  const overlapW = overlapR - overlapL;

  if (overlapW <= 0) {
    gameOver = true; playFail();
    fallingPieces.push({ x: m.x, w: m.w, y: m.y, ci: m.ci, vy: 0 });
    return;
  }

  const leftOverhang = top.x - m.x;
  const rightOverhang = (m.x + m.w) - (top.x + top.w);
  const maxOverhang = Math.max(leftOverhang, rightOverhang);
  const isPerfect = maxOverhang <= PERFECT_TOLERANCE;

  let placedX, placedW;
  if (isPerfect) {
    placedX = top.x; placedW = top.w;
    streak++; score += 1 + streak;
    perfectFlash = 1; playPerfect(streak);
  } else {
    placedX = overlapL; placedW = overlapW;
    streak = 0; score += 1; playLand();
    if (m.x < overlapL) fallingPieces.push({ x: m.x, w: overlapL - m.x, y: m.y, ci: m.ci, vy: 0 });
    if (m.x + m.w > overlapR) fallingPieces.push({ x: overlapR, w: (m.x + m.w) - overlapR, y: m.y, ci: m.ci, vy: 0 });
  }

  const ci = stack.length;
  stack.push({ x: placedX, w: placedW, y: m.y, ci });
  const nextY = m.y - BLOCK_H;
  moving = { x: dir === 1 ? 0 : W - placedW, w: placedW, y: nextY, ci: ci + 1 };
  speed = 2.5 + stack.length * 0.15;
  cameraY = Math.max(0, (stack.length - 10) * BLOCK_H);
}

canvas.addEventListener('touchstart', (e) => { e.preventDefault(); if (gameOver) init(); else place(); });
canvas.addEventListener('mousedown', () => { if (gameOver) init(); else place(); });

function drawNeonBlock(x, y, w, h, ci, alpha) {
  const hue = neonColor(ci);
  const r = Math.min(CORNER_R, w / 2, h / 2);
  ctx.globalAlpha = alpha || 1;

  ctx.beginPath(); ctx.roundRect(x, y, w, h - 2, r);
  ctx.fillStyle = `hsla(${hue}, 80%, 8%, 0.85)`;
  ctx.fill();

  const ig = ctx.createLinearGradient(x, y, x, y + h);
  ig.addColorStop(0, `hsla(${hue}, 80%, 30%, 0.25)`);
  ig.addColorStop(0.5, `hsla(${hue}, 80%, 15%, 0.1)`);
  ig.addColorStop(1, `hsla(${hue}, 80%, 25%, 0.2)`);
  ctx.beginPath(); ctx.roundRect(x, y, w, h - 2, r);
  ctx.fillStyle = ig; ctx.fill();

  ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
  ctx.shadowBlur = 12;
  ctx.beginPath(); ctx.roundRect(x, y, w, h - 2, r);
  ctx.strokeStyle = `hsla(${hue}, 100%, 60%, 0.5)`;
  ctx.lineWidth = 2; ctx.stroke();
  ctx.shadowBlur = 0;

  ctx.beginPath(); ctx.roundRect(x + 1, y + 1, w - 2, h - 4, Math.max(0, r - 1));
  ctx.strokeStyle = `hsla(${hue}, 100%, 70%, 0.9)`;
  ctx.lineWidth = 1.5; ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(x + r + 2, y + 2);
  ctx.lineTo(x + w - r - 2, y + 2);
  ctx.strokeStyle = `hsla(${hue}, 100%, 85%, 0.6)`;
  ctx.lineWidth = 1; ctx.stroke();

  ctx.globalAlpha = 1;
}

let bgStars = [];
for (let i = 0; i < 60; i++) {
  bgStars.push({ x: Math.random(), y: Math.random(), s: Math.random() * 1.5 + 0.5, sp: Math.random() * 0.5 + 0.5 });
}

let time = 0;

function update() {
  time += 0.016;
  if (gameOver) {
    for (let i = fallingPieces.length - 1; i >= 0; i--) {
      fallingPieces[i].vy += 0.5;
      fallingPieces[i].y += fallingPieces[i].vy;
      if (fallingPieces[i].y - cameraY > H + 100) fallingPieces.splice(i, 1);
    }
    return;
  }
  moving.x += speed * dir;
  if (moving.x + moving.w > W) dir = -1;
  if (moving.x < 0) dir = 1;
  if (perfectFlash > 0) perfectFlash -= 0.03;
  for (let i = fallingPieces.length - 1; i >= 0; i--) {
    fallingPieces[i].vy += 0.5;
    fallingPieces[i].y += fallingPieces[i].vy;
    if (fallingPieces[i].y - cameraY > H + 100) fallingPieces.splice(i, 1);
  }
}

function draw() {
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#05051a'); bg.addColorStop(1, '#0f0a2a');
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H);

  for (const s of bgStars) {
    const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(time * s.sp + s.x * 10));
    ctx.fillStyle = `rgba(255,255,255,${twinkle * 0.7})`;
    ctx.fillRect(s.x * W, s.y * H, s.s, s.s);
  }

  ctx.save(); ctx.translate(0, cameraY);
  for (const b of stack) drawNeonBlock(b.x, b.y, b.w, BLOCK_H, b.ci);
  for (const p of fallingPieces) drawNeonBlock(p.x, p.y, p.w, BLOCK_H, p.ci, 0.5);
  if (!gameOver) drawNeonBlock(moving.x, moving.y, moving.w, BLOCK_H, moving.ci);
  ctx.restore();

  if (perfectFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${perfectFlash * 0.08})`;
    ctx.fillRect(0, 0, W, H);
  }

  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,200,255,0.6)'; ctx.shadowBlur = 10;
  ctx.fillStyle = '#fff'; ctx.font = 'bold 36px monospace';
  ctx.fillText(score, W / 2, 52); ctx.shadowBlur = 0;

  if (streak > 0 && !gameOver) {
    ctx.shadowColor = 'rgba(255,200,0,0.6)'; ctx.shadowBlur = 8;
    ctx.font = 'bold 18px monospace'; ctx.fillStyle = '#feca57';
    ctx.fillText('STREAK x' + streak, W / 2, 78); ctx.shadowBlur = 0;
  }

  if (stack.length === 1 && !gameOver) {
    ctx.font = '16px monospace'; ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText('TAP TO STACK', W / 2, H / 2 - 60);
  }

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
    ctx.shadowColor = 'rgba(255,50,100,0.8)'; ctx.shadowBlur = 20;
    ctx.fillStyle = '#fff'; ctx.font = 'bold 28px monospace';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 20); ctx.shadowBlur = 0;
    ctx.font = '16px monospace'; ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText('Score: ' + score, W / 2, H / 2 + 15);
    ctx.fillText('Tap to restart', W / 2, H / 2 + 45);
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
init(); loop();
</script>
</body>
</html>
