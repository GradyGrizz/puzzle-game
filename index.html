<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Stack Tower</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a1a; font-family: monospace; color: #fff; height: 100dvh; overflow: hidden; touch-action: none; }

.screen { display: none; width: 100%; height: 100dvh; position: absolute; top: 0; left: 0; }
.screen.active { display: flex; }

/* Main Menu */
#menu-screen {
  flex-direction: column;
  align-items: center;
  background: linear-gradient(180deg, #05051a 0%, #0f0a2a 100%);
}

.menu-stars {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  pointer-events: none; overflow: hidden;
}
.menu-star {
  position: absolute; background: #fff; border-radius: 50%;
  animation: twinkle 2s ease-in-out infinite alternate;
}
@keyframes twinkle { 0% { opacity: 0.2; } 100% { opacity: 0.8; } }

.menu-header {
  width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 20px 0;
  z-index: 1;
}

.menu-title {
  font-size: 32px;
  font-weight: bold;
  letter-spacing: 3px;
  text-align: center;
  text-shadow: 0 0 20px rgba(0, 200, 255, 0.6), 0 0 40px rgba(0, 200, 255, 0.3);
}
.menu-title .sub {
  display: block;
  font-size: 13px;
  font-weight: normal;
  letter-spacing: 6px;
  color: rgba(255,255,255,0.5);
  margin-top: 6px;
}

.top-nav {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-left: 20px;
}
.nav-btn {
  width: 48px; height: 48px;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.1);
  border-radius: 50%;
  cursor: pointer;
  transition: all 0.2s;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3), inset 0 1px 0 rgba(255,255,255,0.05);
}
.nav-btn svg {
  width: 22px; height: 22px;
  fill: rgba(255,255,255,0.45);
  transition: fill 0.2s;
}
.nav-btn:hover svg, .nav-btn:active svg { fill: rgba(255,255,255,0.8); }
.nav-btn:hover, .nav-btn:active {
  background: rgba(255,255,255,0.1);
  border-color: rgba(0, 200, 255, 0.35);
  box-shadow: 0 0 14px rgba(0, 200, 255, 0.15), 0 2px 8px rgba(0,0,0,0.3);
}

.games-list {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 16px;
  width: 100%;
  padding: 0 24px;
  z-index: 1;
}

.game-btn {
  width: 100%;
  max-width: 340px;
  padding: 20px 24px;
  border-radius: 14px;
  border: 1.5px solid rgba(0, 200, 255, 0.35);
  background: rgba(0, 200, 255, 0.04);
  cursor: pointer;
  transition: all 0.25s;
  position: relative;
  overflow: hidden;
}
.game-btn::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, rgba(0, 200, 255, 0.08) 0%, transparent 60%);
  border-radius: 14px;
  pointer-events: none;
}
.game-btn:hover, .game-btn:active {
  border-color: rgba(0, 200, 255, 0.7);
  background: rgba(0, 200, 255, 0.08);
  box-shadow: 0 0 20px rgba(0, 200, 255, 0.15), inset 0 0 20px rgba(0, 200, 255, 0.05);
  transform: scale(1.02);
}
.game-btn .game-name {
  font-family: monospace;
  font-size: 18px;
  font-weight: bold;
  color: #fff;
  text-shadow: 0 0 10px rgba(0, 200, 255, 0.4);
}
.game-btn .game-desc {
  font-family: monospace;
  font-size: 12px;
  color: rgba(255,255,255,0.45);
  margin-top: 6px;
}

/* Sub-screens (leaderboard, stats, settings) */
#sub-screen {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: linear-gradient(180deg, #05051a 0%, #0f0a2a 100%);
}
.back-btn {
  position: absolute;
  top: 16px; left: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  color: rgba(255,255,255,0.7);
  font-family: monospace;
  font-size: 13px;
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 2;
}
.back-btn:hover, .back-btn:active {
  background: rgba(255,255,255,0.1);
  border-color: rgba(0, 200, 255, 0.4);
  color: #fff;
}
.sub-title {
  font-size: 24px;
  font-weight: bold;
  letter-spacing: 2px;
  text-shadow: 0 0 15px rgba(0, 200, 255, 0.5);
  margin-bottom: 20px;
}
.coming-soon {
  font-size: 14px;
  color: rgba(255,255,255,0.35);
  letter-spacing: 4px;
}

/* Game screen */
#game-screen {
  justify-content: center;
  align-items: center;
  background: #0a0a1a;
}
.game-back-btn {
  position: absolute;
  top: 16px; left: 16px;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 10px;
  color: rgba(255,255,255,0.7);
  font-family: monospace;
  font-size: 13px;
  padding: 8px 16px;
  cursor: pointer;
  transition: all 0.2s;
  z-index: 10;
}
.game-back-btn:hover, .game-back-btn:active {
  background: rgba(255,255,255,0.1);
  border-color: rgba(0, 200, 255, 0.4);
  color: #fff;
}
canvas { display: block; max-width: 100vw; max-height: 100dvh; }
</style>
</head>
<body>

<!-- Main Menu -->
<div id="menu-screen" class="screen active">
  <div class="menu-stars" id="menu-stars"></div>
  <div class="menu-header">
    <div class="menu-title">STACK TOWER<span class="sub">ARCADE</span></div>
    <div class="top-nav">
      <button class="nav-btn" onclick="showSub('Leaderboard')" aria-label="Leaderboard">
        <svg viewBox="0 0 24 24"><path d="M7.5 2v3.5H4a1 1 0 00-1 1V9c0 2.1 1.4 3.9 3.3 4.4C7.3 15 9 16.2 11 16.5V19H8.5a.5.5 0 00-.5.5V21a1 1 0 001 1h6a1 1 0 001-1v-1.5a.5.5 0 00-.5-.5H13v-2.5c2-.3 3.7-1.5 4.7-3.1C19.6 12.9 21 11.1 21 9V6.5a1 1 0 00-1-1h-3.5V2h-9zM5 7.5h2.5V11c0 .2 0 .3 0 .5C6 11.1 5 10 5 9V7.5zm14 0V9c0 1-.9 2.1-2.5 2.5 0-.2 0-.3 0-.5V7.5H19zM9.5 4h5v7a2.5 2.5 0 01-5 0V4z"/></svg>
      </button>
      <button class="nav-btn" onclick="showSub('Stats')" aria-label="Stats">
        <svg viewBox="0 0 24 24"><rect x="4" y="13" width="4" height="7" rx="1"/><rect x="10" y="9" width="4" height="11" rx="1"/><rect x="16" y="4" width="4" height="16" rx="1"/></svg>
      </button>
      <button class="nav-btn" onclick="showSub('Settings')" aria-label="Settings">
        <svg viewBox="0 0 24 24"><path d="M12 15.5A3.5 3.5 0 1112 8.5a3.5 3.5 0 010 7zm7.43-2.53c.04-.32.07-.64.07-.97s-.03-.66-.07-.97l2.11-1.65a.5.5 0 00.12-.64l-2-3.46a.5.5 0 00-.61-.22l-2.49 1a7.37 7.37 0 00-1.67-.97l-.38-2.65A.49.49 0 0014 2h-4a.49.49 0 00-.49.42l-.38 2.65c-.61.25-1.17.59-1.67.97l-2.49-1a.49.49 0 00-.61.22l-2 3.46a.49.49 0 00.12.64l2.11 1.65c-.04.32-.07.65-.07.97s.03.66.07.97l-2.11 1.65a.5.5 0 00-.12.64l2 3.46a.5.5 0 00.61.22l2.49-1c.5.38 1.06.72 1.67.97l.38 2.65c.05.24.26.42.49.42h4c.24 0 .44-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.67-.97l2.49 1a.49.49 0 00.61-.22l2-3.46a.5.5 0 00-.12-.64l-2.11-1.65z"/></svg>
      </button>
    </div>
  </div>
  <div class="games-list">
    <div class="game-btn" onclick="launchGame()">
      <div class="game-name">Stack Tower</div>
      <div class="game-desc">Stack blocks to build the tallest tower</div>
    </div>
  </div>
</div>

<!-- Sub-screen (Leaderboard / Stats / Settings) -->
<div id="sub-screen" class="screen">
  <button class="back-btn" onclick="showMenu()">&larr; Back</button>
  <div class="sub-title" id="sub-title"></div>
  <div class="coming-soon">COMING SOON</div>
</div>

<!-- Game screen -->
<div id="game-screen" class="screen">
  <button class="game-back-btn" onclick="exitGame()">&larr; Menu</button>
  <canvas id="c"></canvas>
</div>

<script>
// --- Screen Navigation ---
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showMenu() { showScreen('menu-screen'); }
function showSub(title) {
  document.getElementById('sub-title').textContent = title;
  showScreen('sub-screen');
}
function launchGame() {
  showScreen('game-screen');
  if (audioCtx.state === 'suspended') audioCtx.resume();
  init();
}
function exitGame() {
  gameOver = true;
  showMenu();
}

// Menu stars
(function() {
  const container = document.getElementById('menu-stars');
  for (let i = 0; i < 50; i++) {
    const star = document.createElement('div');
    star.className = 'menu-star';
    const size = Math.random() * 2 + 1;
    star.style.width = size + 'px';
    star.style.height = size + 'px';
    star.style.left = Math.random() * 100 + '%';
    star.style.top = Math.random() * 100 + '%';
    star.style.animationDelay = Math.random() * 2 + 's';
    star.style.animationDuration = (Math.random() * 2 + 1.5) + 's';
    container.appendChild(star);
  }
})();

// --- Game Code ---
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = Math.min(window.innerWidth, 420);
  H = canvas.height = Math.min(window.innerHeight, 750);
}
resize();
window.addEventListener('resize', resize);

const BLOCK_H = 28;
const PERFECT_TOLERANCE = 3;
const CORNER_R = 4;

const neonHues = [320, 180, 260, 140, 30, 200, 340, 50, 280, 160];

function neonColor(i) {
  return neonHues[i % neonHues.length];
}

// Audio
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playNoise(duration, vol) {
  const buf = audioCtx.createBuffer(1, audioCtx.sampleRate * duration, audioCtx.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
  const src = audioCtx.createBufferSource();
  src.buffer = buf;
  const gain = audioCtx.createGain();
  const filter = audioCtx.createBiquadFilter();
  filter.type = 'lowpass';
  return { src, gain, filter, start(t) { src.connect(filter); filter.connect(gain); gain.connect(audioCtx.destination); src.start(t); src.stop(t + duration); } };
}

function playLand() {
  const now = audioCtx.currentTime;
  // Short low thump via noise
  const n = playNoise(0.08, 0.3);
  n.filter.frequency.setValueAtTime(300, now);
  n.filter.frequency.exponentialRampToValueAtTime(80, now + 0.08);
  n.gain.gain.setValueAtTime(0.3, now);
  n.gain.gain.exponentialRampToValueAtTime(0.001, now + 0.08);
  n.start(now);
}

function playPerfect(streak) {
  const now = audioCtx.currentTime;
  // Soft knock + short clean tone that rises with streak
  const n = playNoise(0.05, 0.15);
  n.filter.frequency.setValueAtTime(400, now);
  n.filter.frequency.exponentialRampToValueAtTime(100, now + 0.05);
  n.gain.gain.setValueAtTime(0.15, now);
  n.gain.gain.exponentialRampToValueAtTime(0.001, now + 0.05);
  n.start(now);

  const freq = 260 + Math.min(streak, 10) * 25;
  const osc = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(freq, now + 0.02);
  g.gain.setValueAtTime(0, now);
  g.gain.linearRampToValueAtTime(0.12, now + 0.03);
  g.gain.exponentialRampToValueAtTime(0.001, now + 0.2);
  osc.connect(g); g.connect(audioCtx.destination);
  osc.start(now + 0.02); osc.stop(now + 0.22);
}

function playFail() {
  const now = audioCtx.currentTime;
  // Low rumble
  const n = playNoise(0.3, 0.2);
  n.filter.frequency.setValueAtTime(200, now);
  n.filter.frequency.exponentialRampToValueAtTime(40, now + 0.3);
  n.gain.gain.setValueAtTime(0.2, now);
  n.gain.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
  n.start(now);
}

let fallingPieces = [];
let stack, moving, dir, speed, gameOver, score, streak, cameraY, perfectFlash;

function init() {
  stack = [{ x: W / 2 - 60, w: 120, y: H - BLOCK_H, ci: 0 }];
  moving = { x: 0, w: 120, y: H - BLOCK_H * 2, ci: 1 };
  dir = 1; speed = 2.5; gameOver = false;
  score = 0; streak = 0; cameraY = 0; perfectFlash = 0;
  fallingPieces = [];
}

function place() {
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const top = stack[stack.length - 1];
  const m = moving;
  const overlapL = Math.max(top.x, m.x);
  const overlapR = Math.min(top.x + top.w, m.x + m.w);
  const overlapW = overlapR - overlapL;

  if (overlapW <= 0) {
    gameOver = true; playFail();
    fallingPieces.push({ x: m.x, w: m.w, y: m.y, ci: m.ci, vy: 0 });
    return;
  }

  const leftOverhang = top.x - m.x;
  const rightOverhang = (m.x + m.w) - (top.x + top.w);
  const maxOverhang = Math.max(leftOverhang, rightOverhang);
  const isPerfect = maxOverhang <= PERFECT_TOLERANCE;

  let placedX, placedW;
  if (isPerfect) {
    placedX = top.x; placedW = top.w;
    streak++; score += 1 + streak;
    perfectFlash = 1; playPerfect(streak);
  } else {
    placedX = overlapL; placedW = overlapW;
    streak = 0; score += 1; playLand(0);
    if (m.x < overlapL) fallingPieces.push({ x: m.x, w: overlapL - m.x, y: m.y, ci: m.ci, vy: 0 });
    if (m.x + m.w > overlapR) fallingPieces.push({ x: overlapR, w: (m.x + m.w) - overlapR, y: m.y, ci: m.ci, vy: 0 });
  }

  const ci = stack.length;
  stack.push({ x: placedX, w: placedW, y: m.y, ci });
  const nextY = m.y - BLOCK_H;
  moving = { x: dir === 1 ? 0 : W - placedW, w: placedW, y: nextY, ci: ci + 1 };
  speed = 2.5 + stack.length * 0.15;
  cameraY = Math.max(0, (stack.length - 10) * BLOCK_H);
}

canvas.addEventListener('touchstart', (e) => {
  e.preventDefault();
  if (!document.getElementById('game-screen').classList.contains('active')) return;
  if (gameOver) init(); else place();
});
canvas.addEventListener('mousedown', () => {
  if (!document.getElementById('game-screen').classList.contains('active')) return;
  if (gameOver) init(); else place();
});

function drawNeonBlock(x, y, w, h, ci, alpha) {
  const hue = neonColor(ci);
  const r = Math.min(CORNER_R, w / 2, h / 2);
  ctx.globalAlpha = alpha || 1;

  // Dark fill
  ctx.beginPath();
  ctx.roundRect(x, y, w, h - 2, r);
  ctx.fillStyle = `hsla(${hue}, 80%, 8%, 0.85)`;
  ctx.fill();

  // Inner subtle gradient
  const ig = ctx.createLinearGradient(x, y, x, y + h);
  ig.addColorStop(0, `hsla(${hue}, 80%, 30%, 0.25)`);
  ig.addColorStop(0.5, `hsla(${hue}, 80%, 15%, 0.1)`);
  ig.addColorStop(1, `hsla(${hue}, 80%, 25%, 0.2)`);
  ctx.beginPath();
  ctx.roundRect(x, y, w, h - 2, r);
  ctx.fillStyle = ig;
  ctx.fill();

  // Outer glow
  ctx.shadowColor = `hsl(${hue}, 100%, 60%)`;
  ctx.shadowBlur = 12;
  ctx.beginPath();
  ctx.roundRect(x, y, w, h - 2, r);
  ctx.strokeStyle = `hsla(${hue}, 100%, 60%, 0.5)`;
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.shadowBlur = 0;

  // Bright neon border
  ctx.beginPath();
  ctx.roundRect(x + 1, y + 1, w - 2, h - 4, Math.max(0, r - 1));
  ctx.strokeStyle = `hsla(${hue}, 100%, 70%, 0.9)`;
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // Top edge highlight
  ctx.beginPath();
  ctx.moveTo(x + r + 2, y + 2);
  ctx.lineTo(x + w - r - 2, y + 2);
  ctx.strokeStyle = `hsla(${hue}, 100%, 85%, 0.6)`;
  ctx.lineWidth = 1;
  ctx.stroke();

  ctx.globalAlpha = 1;
}

// Background stars
let stars = [];
for (let i = 0; i < 60; i++) {
  stars.push({ x: Math.random(), y: Math.random(), s: Math.random() * 1.5 + 0.5, sp: Math.random() * 0.5 + 0.5 });
}

let time = 0;

function update() {
  time += 0.016;
  if (gameOver) {
    for (let i = fallingPieces.length - 1; i >= 0; i--) {
      fallingPieces[i].vy += 0.5;
      fallingPieces[i].y += fallingPieces[i].vy;
      if (fallingPieces[i].y - cameraY > H + 100) fallingPieces.splice(i, 1);
    }
    return;
  }
  moving.x += speed * dir;
  if (moving.x + moving.w > W) dir = -1;
  if (moving.x < 0) dir = 1;
  if (perfectFlash > 0) perfectFlash -= 0.03;
  for (let i = fallingPieces.length - 1; i >= 0; i--) {
    fallingPieces[i].vy += 0.5;
    fallingPieces[i].y += fallingPieces[i].vy;
    if (fallingPieces[i].y - cameraY > H + 100) fallingPieces.splice(i, 1);
  }
}

function draw() {
  // Background
  const bg = ctx.createLinearGradient(0, 0, 0, H);
  bg.addColorStop(0, '#05051a');
  bg.addColorStop(1, '#0f0a2a');
  ctx.fillStyle = bg;
  ctx.fillRect(0, 0, W, H);

  // Stars
  for (const s of stars) {
    const twinkle = 0.4 + 0.6 * Math.abs(Math.sin(time * s.sp + s.x * 10));
    ctx.fillStyle = `rgba(255,255,255,${twinkle * 0.7})`;
    ctx.fillRect(s.x * W, s.y * H, s.s, s.s);
  }

  ctx.save();
  ctx.translate(0, cameraY);

  for (const b of stack) drawNeonBlock(b.x, b.y, b.w, BLOCK_H, b.ci);
  for (const p of fallingPieces) drawNeonBlock(p.x, p.y, p.w, BLOCK_H, p.ci, 0.5);
  if (!gameOver) drawNeonBlock(moving.x, moving.y, moving.w, BLOCK_H, moving.ci);

  ctx.restore();

  // Perfect flash
  if (perfectFlash > 0) {
    ctx.fillStyle = `rgba(255,255,255,${perfectFlash * 0.08})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Score
  ctx.textAlign = 'center';
  ctx.shadowColor = 'rgba(0,200,255,0.6)';
  ctx.shadowBlur = 10;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px monospace';
  ctx.fillText(score, W / 2, 52);
  ctx.shadowBlur = 0;

  if (streak > 0 && !gameOver) {
    ctx.shadowColor = 'rgba(255,200,0,0.6)';
    ctx.shadowBlur = 8;
    ctx.font = 'bold 18px monospace';
    ctx.fillStyle = '#feca57';
    ctx.fillText('STREAK x' + streak, W / 2, 78);
    ctx.shadowBlur = 0;
  }

  if (stack.length === 1 && !gameOver) {
    ctx.font = '16px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.fillText('TAP TO STACK', W / 2, H / 2 - 60);
  }

  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.6)';
    ctx.fillRect(0, 0, W, H);
    ctx.shadowColor = 'rgba(255,50,100,0.8)';
    ctx.shadowBlur = 20;
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px monospace';
    ctx.fillText('GAME OVER', W / 2, H / 2 - 20);
    ctx.shadowBlur = 0;
    ctx.font = '16px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.fillText('Score: ' + score, W / 2, H / 2 + 15);
    ctx.fillText('Tap to restart', W / 2, H / 2 + 45);
  }
}

function loop() { update(); draw(); requestAnimationFrame(loop); }
init();
loop();
</script>
</body>
</html>
