<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090e">
<meta name="description" content="A retro dungeon puzzle adventure. Push blocks, claim relics, race the depths.">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-180.png">
<title>Delve — Dungeon Puzzles</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100dvh;
  background: #08090e;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  font-family: monospace;
}
canvas {
  position: absolute;
  left: 0; top: 0;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
/* the game lives inside #device. On a real phone it fills the screen; on a
   desktop browser we shrink it into a centred phone bezel (see body.framed)
   so the site reads as a portrait app instead of a stretched full screen. */
#device {
  position: relative;
  width: 100%; height: 100dvh;
  overflow: hidden;
  background: #08090e;
}
body.framed {
  background: radial-gradient(circle at 50% 38%, #16171d, #050506 72%);
  display: flex; align-items: center; justify-content: center;
}
body.framed #device {
  width: 844px; height: 390px;           /* JS rescales to fit the window */
  border-radius: 46px;
  box-shadow: 0 0 0 2px #23252d, 0 0 0 13px #0c0d11, 0 0 0 15px #34363f,
              0 40px 90px rgba(0,0,0,0.65);
}
/* simulated landscape phone speaker / sensor pill */
body.framed #device::before {
  content: ''; position: absolute; left: 50%; top: 0;
  transform: translateX(-50%);
  width: 156px; height: 18px; background: #000;
  border-radius: 0 0 12px 12px; z-index: 30; pointer-events: none;
}
#controls {
  position: absolute;
  left: 0; right: 0; top: 0; bottom: 0;   /* full-device overlay so top-anchored
                                             buttons measure from the top */
  padding-bottom: max(14px, env(safe-area-inset-bottom));
  display: none;
  z-index: 10;
  pointer-events: none;
}
body.in-game #controls { display: block; }
.dpad {
  position: absolute;
  bottom: max(18px, env(safe-area-inset-bottom));
  left: max(18px, env(safe-area-inset-left));
  transform: none;
  display: grid;
  grid-template-columns: 58px 58px 58px;
  grid-template-rows: 58px 58px 58px;
  gap: 5px;
  pointer-events: auto;
}
.dp, .ab {
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.13);
  border-radius: 13px;
  color: rgba(255,255,255,0.42);
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-user-select: none;
  transition: background 0.07s, border-color 0.07s, color 0.07s;
}
.dp:active, .ab:active {
  background: rgba(200,160,40,0.2);
  border-color: rgba(210,170,50,0.55);
  color: rgba(230,190,60,0.9);
}
.acts {
  position: absolute;
  bottom: max(30px, env(safe-area-inset-bottom));
  right: 14px;
  display: flex; flex-direction: column; gap: 10px;
  pointer-events: auto;
}
.acts-left {
  position: absolute;
  bottom: max(30px, env(safe-area-inset-bottom));
  left: 14px;
  display: flex; flex-direction: column; gap: 10px;
  pointer-events: auto;
}
body.no-relics .acts-left { display: none; }
.ab { width: 58px; height: 46px; font-size: 12px; letter-spacing: 1px; }
.ab.gear { height: 54px; }
.ab .ab-ico { font-size: 20px; line-height: 1; }
.ab .ab-lbl { font-size: 9px; letter-spacing: 1px; margin-top: 2px; opacity: 0.8; }
.ab.pulse { animation: pulse 0.9s ease-in-out infinite; }
@keyframes pulse {
  0%,100% { border-color: rgba(210,170,50,0.55); background: rgba(200,160,40,0.12); }
  50%     { border-color: rgba(240,200,80,0.95); background: rgba(220,180,60,0.30); }
}
/* ── right-thumb combat buttons (joystick scheme only) ── */
.combat {
  position: absolute;
  right: max(18px, env(safe-area-inset-right));
  bottom: max(18px, env(safe-area-inset-bottom));
  width: 156px; height: 150px;
  display: none;
  pointer-events: none;
}
.cbtn {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.15);
  color: rgba(230,190,60,0.9);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  pointer-events: auto; cursor: pointer;
  -webkit-user-select: none;
  transition: background 0.07s, border-color 0.07s;
}
.cbtn:active { background: rgba(200,160,40,0.30); border-color: rgba(240,200,80,0.95); }
.cbtn.locked {
  opacity: 0.28;
  filter: grayscale(1);
  border-color: rgba(255,255,255,0.10);
  color: rgba(255,255,255,0.24);
}
.cbtn.locked:active { background: rgba(255,255,255,0.04); border-color: rgba(255,255,255,0.10); }
.cbtn .ab-ico { font-size: 26px; line-height: 1; }
.cbtn .ab-lbl { font-size: 9px; letter-spacing: 1px; margin-top: 1px; opacity: 0.85; }
#btn-sword { width: 86px; height: 86px; right: 0; bottom: 0; }
#btn-sword .ab-ico { font-size: 34px; }
#btn-act   { width: 62px; height: 62px; right: 92px; bottom: 20px; }
/* scheme switching: joystick hides the d-pad + shows combat buttons and
   tucks the puzzle utilities into compact columns up the screen edges */
body.scheme-joystick .dpad { display: none; }
body.scheme-joystick .combat { display: block; }
body.scheme-dpad .combat { display: none; }
body.scheme-joystick .acts {
  top: 62px; bottom: auto; right: max(8px, env(safe-area-inset-right)); gap: 7px;
}
body.scheme-joystick .acts .ab { width: 48px; height: 30px; font-size: 9px; }
body.scheme-joystick .acts-left {
  top: 62px; bottom: auto; left: max(8px, env(safe-area-inset-left)); gap: 7px;
}
body.scheme-joystick .acts-left .ab.gear { width: 48px; height: 40px; }
body.scheme-joystick .acts-left .ab .ab-ico { font-size: 16px; }
body.scheme-joystick .acts-left .ab .ab-lbl { font-size: 8px; }
</style>
</head>
<body>
<div id="device">
<canvas id="c"></canvas>
<div id="safe-probe" style="position:absolute;top:0;left:0;width:0;height:0;padding-top:env(safe-area-inset-top);visibility:hidden;"></div>
<div id="controls">
  <div class="dpad">
    <div></div><div class="dp" id="dp-up" aria-label="Up">&#9650;</div><div></div>
    <div class="dp" id="dp-left" aria-label="Left">&#9664;</div><div></div><div class="dp" id="dp-right" aria-label="Right">&#9654;</div>
    <div></div><div class="dp" id="dp-down" aria-label="Down">&#9660;</div><div></div>
  </div>
  <div class="acts-left">
    <div class="ab gear" id="btn-gear" aria-label="Equipment"><span class="ab-ico">&#9876;</span><span class="ab-lbl">GEAR</span></div>
    <div class="ab gear" id="btn-bag" aria-label="Inventory"><span class="ab-ico">&#9635;</span><span class="ab-lbl">ITEMS</span></div>
  </div>
  <div class="acts">
    <div class="ab" id="btn-hint" aria-label="Hint">HINT</div>
  </div>
  <div class="combat">
    <div class="cbtn" id="btn-act" aria-label="Roll"><span class="ab-ico">&raquo;</span><span class="ab-lbl">ROLL</span></div>
    <div class="cbtn" id="btn-sword" aria-label="Sword"><span class="ab-ico">&#9876;</span><span class="ab-lbl">ATTACK</span></div>
  </div>
</div>
</div>
<script src="js/font.js"></script>
<script src="js/audio.js"></script>
<script src="js/save.js"></script>
<script src="js/platform.js"></script>
<script src="js/art.js"></script>
<script src="js/engine.js"></script>
<script src="js/levels.js"></script>
<script src="js/dungeon.js"></script>
<script src="js/combat.js"></script>
<script src="js/freemove.js"></script>
<script src="js/gen.js"></script>
<script src="js/screens.js"></script>
<script src="js/gear.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
<script src="js/modes.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
