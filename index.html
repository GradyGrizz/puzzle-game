<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090e">
<title>Delve — Dungeon Puzzles</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  width: 100%; height: 100dvh;
  background: #08090e;
  overflow: hidden;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  font-family: monospace;
}
canvas {
  position: absolute;
  left: 0; top: 0;
  image-rendering: pixelated;
  image-rendering: crisp-edges;
}
#controls {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  padding-bottom: max(14px, env(safe-area-inset-bottom));
  display: none;
  z-index: 10;
  pointer-events: none;
}
body.in-game #controls { display: block; }
.dpad {
  position: absolute;
  bottom: max(18px, env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  display: grid;
  grid-template-columns: 58px 58px 58px;
  grid-template-rows: 58px 58px 58px;
  gap: 5px;
  pointer-events: auto;
}
.dp, .ab {
  background: rgba(255,255,255,0.07);
  border: 2px solid rgba(255,255,255,0.13);
  border-radius: 13px;
  color: rgba(255,255,255,0.42);
  font-size: 20px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  -webkit-user-select: none;
  transition: background 0.07s, border-color 0.07s, color 0.07s;
}
.dp:active, .ab:active {
  background: rgba(200,160,40,0.2);
  border-color: rgba(210,170,50,0.55);
  color: rgba(230,190,60,0.9);
}
.acts {
  position: absolute;
  bottom: max(30px, env(safe-area-inset-bottom));
  right: 14px;
  display: flex; flex-direction: column; gap: 10px;
  pointer-events: auto;
}
.ab { width: 58px; height: 46px; font-size: 12px; letter-spacing: 1px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <div class="dpad">
    <div></div><div class="dp" id="dp-up" aria-label="Up">&#9650;</div><div></div>
    <div class="dp" id="dp-left" aria-label="Left">&#9664;</div><div></div><div class="dp" id="dp-right" aria-label="Right">&#9654;</div>
    <div></div><div class="dp" id="dp-down" aria-label="Down">&#9660;</div><div></div>
  </div>
  <div class="acts">
    <div class="ab" id="btn-hint" aria-label="Hint">HINT</div>
    <div class="ab" id="btn-undo" aria-label="Undo">UNDO</div>
    <div class="ab" id="btn-reset" aria-label="Reset">RESET</div>
  </div>
</div>
<script src="js/font.js"></script>
<script src="js/audio.js"></script>
<script src="js/save.js"></script>
<script src="js/platform.js"></script>
<script src="js/art.js"></script>
<script src="js/engine.js"></script>
<script src="js/levels.js"></script>
<script src="js/gen.js"></script>
<script src="js/screens.js"></script>
<script src="js/game.js"></script>
<script src="js/main.js"></script>
<script src="js/modes.js"></script>
<script src="js/shop.js"></script>
</body>
</html>
